<!DOCTYPE html>
<html lang="it">
<head>
    <title>NASA Asteroid Dashboard - Chiara Polizzi</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Dashboard Asteroidi NASA</h1>
            <button class="btn-sync" onclick="syncNasaData()">Sincronizza Dati NASA</button>
        </div>

        <div class="filters">
            <label for="startDate">Da:</label>
            <input type="date" id="startDate">
            
            <label for="endDate">A:</label>
            <input type="date" id="endDate">
            
            <button onclick="loadChart()">Filtra per Periodo</button>
        </div>

        <canvas id="myChart"></canvas>
    </div>

    <script src="/js/dashboard.js"></script>
    
</body>
</html>
